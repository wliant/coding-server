services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    env_file:
      - .env

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"
    env_file:
      - .env

  tools:
    ports:
      - "${TOOLS_PORT:-8002}:8002"
    volumes:
      - ./tools/src:/app/src
      - ./tools/tests:/app/tests
    env_file:
      - .env

  api:
    command:
      - uvicorn
      - api.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/src
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./api/src:/app/src
      - ./api/tests:/app/tests
      - ./api/alembic:/app/alembic
      - ./agent-work:/agent-work
    environment:
      PYTHONPATH: /app/src
    env_file:
      - .env

  controller:
    ports:
      - "${CONTROLLER_PORT:-8003}:8003"
    volumes:
      - ./agents-controller/src:/app/src
      - ./agents-controller/tests:/app/tests
    env_file:
      - .env

  simple_crewai_pair_agent:
    ports:
      - "${WORKER_PORT:-8001}:8001"
    volumes:
      - ./agents/simple_crewai_pair_agent/src:/app/src
      - ./agents/simple_crewai_pair_agent/tests:/app/tests
      - ./agents/simple_crewai_pair_agent/alembic:/app/alembic
      - ./agent-work:/agent-work
    environment:
      PYTHONPATH: /app/src
      CORS_ORIGINS: "http://localhost:3000"
    env_file:
      - .env

  simple_langchain_deepagent:
    ports:
      - "${DEEPAGENT_PORT:-8004}:8004"
    volumes:
      - ./agents/simple_langchain_deepagent/src:/app/src
      - ./agents/simple_langchain_deepagent/tests:/app/tests
      - ./agents/simple_langchain_deepagent/alembic:/app/alembic
      - ./agent-work:/agent-work
    environment:
      PYTHONPATH: /app/src
    env_file:
      - .env

  openhands_agent:
    ports:
      - "${OPENHANDS_PORT:-8005}:8005"
    volumes:
      - ./agents/openhands_agent/src:/app/src
      - ./agents/openhands_agent/tests:/app/tests
      - ./agents/openhands_agent/alembic:/app/alembic
      - ./agent-work:/agent-work
    environment:
      PYTHONPATH: /app/src
      CORS_ORIGINS: "http://localhost:3000"
    env_file:
      - .env

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      target: dev
    command:
      - npm
      - run
      - dev
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/next.config.ts:/app/next.config.ts:ro
      - ./web/tsconfig.json:/app/tsconfig.json:ro
      - ./web/tailwind.config.ts:/app/tailwind.config.ts:ro
      - ./web/postcss.config.mjs:/app/postcss.config.mjs:ro
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXT_PUBLIC_WORKER_URL: "http://localhost:8001"
    env_file:
      - .env
