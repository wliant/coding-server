services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    env_file:
      - .env

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"
    env_file:
      - .env

  tools:
    ports:
      - "${TOOLS_PORT:-8002}:8002"
    volumes:
      - ./tools/src:/app/src
      - ./tools/tests:/app/tests
    env_file:
      - .env

  api:
    command:
      - uvicorn
      - api.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/src
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./api/src:/app/src
      - ./api/tests:/app/tests
      - ./api/alembic:/app/alembic
      - ./agent-work:/agent-work
    env_file:
      - .env

  worker:
    ports:
      - "${WORKER_PORT:-8001}:8001"
    volumes:
      - ./worker/src:/app/src
      - ./worker/tests:/app/tests
      - ./agents/simple_crewai_pair_agent/src:/app/agents/simple_crewai_pair_agent/src
      - ./agent-work:/agent-work
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5-coder:7b}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-NA}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-5}
      LEASE_TTL_SECONDS: ${LEASE_TTL_SECONDS:-300}
      LEASE_RENEWAL_INTERVAL_SECONDS: ${LEASE_RENEWAL_INTERVAL_SECONDS:-120}
    env_file:
      - .env

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      target: dev
    command:
      - npm
      - run
      - dev
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/next.config.ts:/app/next.config.ts:ro
      - ./web/tsconfig.json:/app/tsconfig.json:ro
      - ./web/tailwind.config.ts:/app/tailwind.config.ts:ro
      - ./web/postcss.config.mjs:/app/postcss.config.mjs:ro
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    env_file:
      - .env
