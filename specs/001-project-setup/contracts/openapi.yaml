openapi: 3.1.0

info:
  title: Multi-Agent Development System API
  version: 0.1.0
  description: >
    REST API for the Multi-Agent Software Development System backend.
    Single-user system for submitting, tracking, and reviewing software
    development jobs executed by an AI agent worker.

servers:
  - url: http://localhost:8000
    description: Local development (direct)
  - url: http://api:8000
    description: Docker internal network

tags:
  - name: Health
    description: Service health and readiness
  - name: Projects
    description: Software project management
  - name: Jobs
    description: Job submission and tracking

paths:

  /health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [Health]
      description: >
        Returns the health status of the API service and its dependencies
        (database and Redis). Use this endpoint for Docker health checks
        and monitoring probes.
      responses:
        '200':
          description: Service health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                components:
                  database: ok
                  redis: ok
                  worker: ok

  /projects:
    get:
      summary: List all projects
      operationId: listProjects
      tags: [Projects]
      description: Returns a summary list of all projects, ordered by creation date descending.
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectSummary'

    post:
      summary: Create a new project
      operationId: createProject
      tags: [Projects]
      description: >
        Creates a new project. If source_type is 'existing', a valid git_url
        must be provided.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreate'
            examples:
              new_project:
                summary: New project (no existing repo)
                value:
                  name: My New Service
                  source_type: new
              existing_project:
                summary: Existing repository
                value:
                  name: Legacy Monolith
                  source_type: existing
                  git_url: https://github.com/example/legacy-monolith.git
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '422':
          description: Validation error (e.g., missing git_url for existing project)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /projects/{project_id}:
    get:
      summary: Get a project by ID
      operationId: getProject
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects/{project_id}/jobs:
    get:
      summary: List jobs for a project
      operationId: listProjectJobs
      tags: [Jobs]
      description: Returns all jobs for a project, ordered by creation date descending.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [queued, in_progress, completed, failed]
          description: Filter jobs by status
      responses:
        '200':
          description: List of jobs for the project
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobSummary'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Submit a new job for a project
      operationId: createJob
      tags: [Jobs]
      description: >
        Submits a new requirement for the agent worker to implement.
        Only one job may be in_progress at a time; returns 409 if another
        job is already running.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobCreate'
            example:
              requirement: >
                Add a /metrics endpoint that returns Prometheus-formatted
                metrics for request count and latency by route.
      responses:
        '201':
          description: Job created and queued for execution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Another job is already in progress; only one job runs at a time
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error (e.g., empty requirement)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /jobs/{job_id}:
    get:
      summary: Get a job by ID
      operationId: getJob
      tags: [Jobs]
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job details including current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /jobs/{job_id}/logs:
    get:
      summary: Get execution logs for a job
      operationId: getJobLogs
      tags: [Jobs]
      description: >
        Returns execution log entries for a job. Log entries are stored in Redis
        during execution and are available immediately as the worker produces them.
        Use offset/limit for pagination.
      parameters:
        - $ref: '#/components/parameters/JobId'
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Log entry index offset (0-based)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
          description: Maximum number of log entries to return
      responses:
        '200':
          description: Log entries for the job
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LogEntry'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:

  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      description: Project UUID
      schema:
        type: string
        format: uuid

    JobId:
      name: job_id
      in: path
      required: true
      description: Job UUID
      schema:
        type: string
        format: uuid

  schemas:

    HealthResponse:
      type: object
      required: [status, components]
      description: Service health status including dependency health
      properties:
        status:
          type: string
          enum: [ok, degraded, unhealthy]
          description: >
            ok — all components healthy;
            degraded — some non-critical components unavailable;
            unhealthy — critical components unavailable
        components:
          type: object
          description: Per-component health status
          additionalProperties:
            type: string
            enum: [ok, unavailable]
          example:
            database: ok
            redis: ok
            worker: ok

    ProjectCreate:
      type: object
      required: [name, source_type]
      description: Request body for creating a new project
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable project name
        source_type:
          type: string
          enum: [new, existing]
          description: Whether this is a new project or based on an existing repository
        git_url:
          type: string
          format: uri
          nullable: true
          description: Git repository URL; required when source_type is 'existing'

    ProjectSummary:
      type: object
      required: [id, name, source_type, status, created_at, job_count]
      description: Lightweight project representation for list views
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        source_type:
          type: string
          enum: [new, existing]
        status:
          type: string
          enum: [active, archived]
        created_at:
          type: string
          format: date-time
        job_count:
          type: integer
          minimum: 0
          description: Total number of jobs submitted for this project

    Project:
      allOf:
        - $ref: '#/components/schemas/ProjectSummary'
        - type: object
          required: [updated_at]
          description: Full project representation
          properties:
            git_url:
              type: string
              format: uri
              nullable: true
            updated_at:
              type: string
              format: date-time

    JobCreate:
      type: object
      required: [requirement]
      description: Request body for submitting a new job
      properties:
        requirement:
          type: string
          minLength: 10
          description: >
            A well-defined requirement describing what the agent should implement.
            Should be specific and unambiguous.

    JobSummary:
      type: object
      required: [id, project_id, status, created_at]
      description: Lightweight job representation for list views
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, in_progress, completed, failed]
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    Job:
      allOf:
        - $ref: '#/components/schemas/JobSummary'
        - type: object
          description: Full job representation including requirement and execution details
          properties:
            requirement:
              type: string
              description: The original requirement text submitted by the user
            started_at:
              type: string
              format: date-time
              nullable: true
            error_message:
              type: string
              nullable: true
              description: Error details if status is 'failed'
            work_directory:
              type: string
              nullable: true
              description: Path to the job's isolated work directory (set when in_progress)

    LogEntry:
      type: object
      required: [timestamp, level, message]
      description: A single structured log entry from job execution
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          enum: [DEBUG, INFO, WARN, ERROR]
        message:
          type: string

    ValidationError:
      type: object
      required: [detail]
      description: FastAPI validation error response (422 Unprocessable Entity)
      properties:
        detail:
          type: array
          items:
            type: object
            properties:
              loc:
                type: array
                items:
                  oneOf:
                    - type: string
                    - type: integer
              msg:
                type: string
              type:
                type: string

    ErrorResponse:
      type: object
      required: [detail]
      description: Standard error response for 4xx/5xx errors
      properties:
        detail:
          type: string
          description: Human-readable error description
