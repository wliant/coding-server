services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5532}:5432"
    env_file:
      - .env.e2e

  redis:
    ports:
      - "${REDIS_PORT:-6479}:6379"
    env_file:
      - .env.e2e

  tools:
    ports:
      - "${TOOLS_PORT:-8102}:8002"
    env_file:
      - .env.e2e

  api:
    ports:
      - "${API_PORT:-8100}:8000"
    environment:
      CORS_ORIGINS: "http://web:3000"
    env_file:
      - .env.e2e

  simple_crewai_pair_agent:
    ports:
      - "${WORKER_PORT:-8101}:8001"
    environment:
      CORS_ORIGINS: "http://web:3000"
    env_file:
      - .env.e2e

  sandbox:
    ports:
      - "${SANDBOX_PORT:-8105}:8006"
    env_file:
      - .env.e2e

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://api:8000
    ports:
      - "${WEB_PORT:-3100}:3000"
    env_file:
      - .env.e2e

  test-runner:
    build:
      context: ./web/tests/e2e
    environment:
      API_URL: http://api:8000
      WORKER_URL: http://simple_crewai_pair_agent:8001
      TOOLS_URL: http://tools:8002
      BASE_URL: http://web:3000
    networks:
      - backend
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
      simple_crewai_pair_agent:
        condition: service_healthy
      tools:
        condition: service_healthy
    restart: "no"

  pytest-runner:
    build:
      context: ./e2e-pytest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./e2e-pytest/logs:/app/logs
    environment:
      BASE_URL: http://web:3000
      API_URL: http://api:8000
      WORKER_URL: http://simple_crewai_pair_agent:8001
      TOOLS_URL: http://tools:8002
      SANDBOX_URL: http://sandbox:8006
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/madm
      COMPOSE_PROJECT: ${COMPOSE_PROJECT_NAME:-madm_e2e}
    networks:
      - backend
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
      simple_crewai_pair_agent:
        condition: service_healthy
      tools:
        condition: service_healthy
      sandbox:
        condition: service_healthy
    restart: "no"
