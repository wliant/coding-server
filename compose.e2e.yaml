services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5532}:5432"
    env_file:
      - .env.e2e

  redis:
    ports:
      - "${REDIS_PORT:-6479}:6379"
    env_file:
      - .env.e2e

  tools:
    ports:
      - "${TOOLS_PORT:-8102}:8002"
    env_file:
      - .env.e2e

  api:
    ports:
      - "${API_PORT:-8100}:8000"
    env_file:
      - .env.e2e

  worker:
    ports:
      - "${WORKER_PORT:-8101}:8001"
    env_file:
      - .env.e2e

  web:
    ports:
      - "${WEB_PORT:-3100}:3000"
    env_file:
      - .env.e2e

  test-runner:
    build:
      context: ./web/tests/e2e
    environment:
      API_URL: http://api:8000
      WORKER_URL: http://worker:8001
      TOOLS_URL: http://tools:8002
      BASE_URL: http://web:3000
    networks:
      - backend
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
      worker:
        condition: service_healthy
      tools:
        condition: service_healthy
    restart: "no"
