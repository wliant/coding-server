name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Taskfile
        uses: go-task/setup-task@v1
        with:
          version: '3.x'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web dependencies and generate client
        working-directory: web
        run: |
          npm ci
          npm run generate

      - name: Copy env file
        run: cp .env.example .env

      - name: Start dev environment
        run: task dev &

      - name: Wait for services to be healthy
        run: |
          docker compose -f compose.yaml -f compose.dev.yaml wait api worker tools web || \
          docker compose -f compose.yaml -f compose.dev.yaml ps

      - name: Run all tests
        run: task test-all
