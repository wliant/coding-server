networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  agent_work:

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-madm}
    expose:
      - "5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ./api
    command: ["python", "-m", "alembic", "-c", "alembic.ini", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-madm}
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  controller:
    build:
      context: ./agents-controller
    expose:
      - "8003"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-madm}
      API_URL: http://api:8000
      CONTROLLER_PORT: "8003"
    networks:
      - backend
    depends_on:
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  tools:
    build:
      context: ./tools
    expose:
      - "8002"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-madm}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - agent_work:/agent-work
    networks:
      - backend
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  simple_crewai_pair_agent:
    build:
      context: ./agents/simple_crewai_pair_agent
    expose:
      - "8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-madm}
      CONTROLLER_URL: http://controller:8003
      AGENT_TYPE: ${AGENT_TYPE:-simple_crewai_pair_agent}
      WORK_DIR: /agent-work
      TOOLS_GATEWAY_URL: http://tools:8002
      HEARTBEAT_INTERVAL_SECONDS: ${HEARTBEAT_INTERVAL_SECONDS:-15}
      WORKER_ID: ${WORKER_ID:-}
    volumes:
      - agent_work:/agent-work
    networks:
      - backend
    depends_on:
      controller:
        condition: service_healthy
      tools:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  simple_langchain_deepagent:
    build:
      context: ./agents/simple_langchain_deepagent
    expose:
      - "8004"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-madm}
      CONTROLLER_URL: http://controller:8003
      AGENT_TYPE: ${LANGCHAIN_AGENT_TYPE:-simple_langchain_deepagent}
      WORK_DIR: /agent-work
      WORKER_PORT: "8004"
      TOOLS_GATEWAY_URL: http://tools:8002
      HEARTBEAT_INTERVAL_SECONDS: ${HEARTBEAT_INTERVAL_SECONDS:-15}
      WORKER_ID: ${LANGCHAIN_WORKER_ID:-}
    volumes:
      - agent_work:/agent-work
    networks:
      - backend
    depends_on:
      controller:
        condition: service_healthy
      tools:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  openhands_agent:
    build:
      context: ./agents/openhands_agent
    expose:
      - "8005"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-madm}
      CONTROLLER_URL: http://controller:8003
      AGENT_TYPE: ${OPENHANDS_AGENT_TYPE:-openhands_agent}
      WORK_DIR: /agent-work
      WORKER_PORT: "8005"
      TOOLS_GATEWAY_URL: http://tools:8002
      HEARTBEAT_INTERVAL_SECONDS: ${HEARTBEAT_INTERVAL_SECONDS:-15}
      WORKER_ID: ${OPENHANDS_WORKER_ID:-}
    volumes:
      - agent_work:/agent-work
    networks:
      - backend
    depends_on:
      controller:
        condition: service_healthy
      tools:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  sandbox:
    build:
      context: ./sandbox
    expose:
      - "8006"
    environment:
      CONTROLLER_URL: http://controller:8003
      SANDBOX_PORT: "8006"
      LABELS: "python,git"
      WORKSPACE_DIR: /workspace
      HEARTBEAT_INTERVAL_SECONDS: ${HEARTBEAT_INTERVAL_SECONDS:-15}
      SANDBOX_ID: ${SANDBOX_ID:-}
    networks:
      - backend
    depends_on:
      controller:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    expose:
      - "3000"
    environment:
      NODE_ENV: production
    networks:
      - backend
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
