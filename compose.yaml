networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  agent_work:

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-madm}
    expose:
      - "5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ./api
    command: ["python", "-m", "alembic", "-c", "alembic.ini", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-madm}
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  tools:
    build:
      context: ./tools
    expose:
      - "8002"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-madm}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - agent_work:/agent-work
    networks:
      - backend
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    expose:
      - "8001"
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-madm}
      AGENT_WORK_PARENT: /agent-work
      TOOLS_GATEWAY_URL: http://tools:8002
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5-coder:7b}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-NA}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-5}
      LEASE_TTL_SECONDS: ${LEASE_TTL_SECONDS:-300}
      LEASE_RENEWAL_INTERVAL_SECONDS: ${LEASE_RENEWAL_INTERVAL_SECONDS:-120}
    volumes:
      - agent_work:/agent-work
    networks:
      - backend
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      tools:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    expose:
      - "3000"
    environment:
      NODE_ENV: production
    networks:
      - backend
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
